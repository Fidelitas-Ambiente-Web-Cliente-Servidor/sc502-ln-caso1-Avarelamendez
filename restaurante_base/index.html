<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurante Ficticio</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet"
  />

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<header> 
    <!-- Menu principal -->
  <h1>Restaurante Argentina en CR</h1>
  <div class="filtros">

      <!-- Botones que filtran menú -->
<button type="button" class="btn-filtro btn-Todos" onclick="filtrarCategoria('Todos')">Todos</button>
<button type="button" class="btn-filtro btn-entradas" onclick="filtrarCategoria('Entrada')">Entradas</button>
<button type="button" class="btn-filtro btn-fuertes" onclick="filtrarCategoria('Plato Fuerte')">Platos Fuertes</button>
<button type="button" class="btn-filtro btn-postres" onclick="filtrarCategoria('Postre')">Postres</button>
  </div>
</header>

<body>

    <!-- Funcion que llama a las cards del menu en el JS  -->
  <section class="cards-wrapper"></section>

  
<div>
  
    <!-- Formulario de reservaciones -->
  <h4> Reserva una fecha especial en Argentina en CR </h4>
<form id="form-reserva" class="row g-3">
  <div class="col-nombre">
    <label for="inputNombre" class="form-label">Nombre Completo</label>
    <input type="text" class="form-control" id="inputNombre" placeholder="Adrian Varela Méndez">
  </div>
  <div class="col-correo">
    <label for="inputCorreo" class="form-label">Correo Electrónico</label>
    <input type="email" class="form-control" id="inputCorreo" placeholder="averela@gmail.com">
  </div>
  <div class="col-fecha">
    <label for="inputFecha" class="form-label">Fecha de reserva</label>
    <input type="date" class="form-control" id="inputFecha">
  </div>
  <div class="col-cantidad">
    <label for="inputCantidad" class="form-label">Cantidad de personas</label>
    <input type="number" class="form-control" id="inputCantidad" placeholder="1" min="1">
  </div>
  <div class="col-12">
    <button type="submit" class="btn btn-primary">Reservar</button>
  </div>
</form>

  <!-- Lista de resevaciones creadas -->
<h4> Lista de reservaciones </h4>
<table class="tabla-reservas">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Correo</th>
      <th>Fecha</th>
      <th>Hora</th>
      <th>Personas</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

  <!-- Resumen dinamico -->
<h4> Cantidad de reservas en curso</h4>
<div class="resumen-reservas">
  <div class="resumen-item">
    <span class="resumen-label">Total de reservas</span>
    <span class="resumen-total">0</span>
  </div>
  <div class="resumen-item">
    <span class="resumen-label">Total de personas</span>
    <span class="resumen-personas">0</span>
  </div>
  <div class="resumen-item">
    <span class="resumen-label">Mayor reserva</span>
    <span class="resumen-mayor-nombre">—</span>
    <span class="resumen-mayor-cantidad"></span>
  </div>
</div>

  <script src="js/app.js"></script>

</body>
<footer> <h6>Todos los derechos reservados - Adrián Varela</h6> </footer>

</html>
